---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "monthly"
  - package-ecosystem: "bun"
    directory: ".github/commitlint"
    schedule:
      interval: "monthly"
